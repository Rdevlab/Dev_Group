<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <script src="app.js" defer></script>
    <title>Dev_Tasks</title>
    <style>
      * {
        outline: none;
      }
      ::-webkit-scrollbar {
        display: none;
      }
      .animate {
        animation: animate 5s linear forwards;
      }
      @keyframes animate {
        to {
          width: 0;
        }
      }
      .enter {
        animation: enter 0.5s ease forwards;
      }
      .bg {
        background:
          linear-gradient(135deg, rgba(0, 0, 0, 0.165), rgba(0, 0, 0, 0.141)),
          url("./assets/bg.jpg");
        background-size: cover;
        background-position: center;
      }
      @keyframes enter {
        from {
          transform: translateX(100px);
        }
      }
    </style>
  </head>
  <body class="overflow-hidden">
    <section
      class="w-full h-screen flex items-center justify-center bg fixed top-0 p-10 left-0 right-0 bottom-0"
      id="loginsec">
      <div
        class="flex flex-col xl:gap-6 gap-4 xl:p-10 md:p-4 p-2 rounded-md bg-white/30 backdrop-blur-xl shadow-xl">
        <div class="flex flex-col gap-2 items-center">
          <i class="fa-regular fa-user text-5xl"></i>
          <h1 class="font-bold xl:text-2xl text-lg w-full text-center">Log in to your account</h1>
        </div>
        <div class="flex items-start flex-col">
          <label for="username">Enter your userName</label>
          <input
            type="text"
            id="username"
            maxlength="12"
            placeholder="Username"
            class="border border-transparent w-full border-b-black bg-none p-1" />
        </div>
        <div class="flex items-start flex-col">
          <label for="password"> Enter your password</label>
          <input
            type="password"
            id="password"
            placeholder="password"
            maxlength="12"
            class="border border-transparent border-b-black w-full p-1" />
        </div>
        <button
          type="submit"
          class="px-4 py-2 bg-blue-600 cursor-pointer text-white rounded-md hover:bg-blue-400 duration-200"
          onclick="login()">
          Login
        </button>
      </div>
    </section>
    <article
      id="notes"
      class="absolute w-50 xl:text-xl flex flex-col gap-3 items-center p-4 bg-white/50 backdrop-blur-xl rounded-xl xl:right-14 right-2 xl:top-14 top-2">
      <span class="xl:text-4xl text-xl"><i class="fab fa-github"></i></span>
      <p>Learn github and Deploy your mini projects on it, please!</p>
    </article>

    <section
      id="taskContainer"
      class="w-full h-screen flex flex-col justify-around md:flex-row xl:flex-row gap-8 p-10 bg overflow-hidden overflow-y-scroll"></section>
    <section class="absolute right-14 bottom-14 flex flex-col gap-4" id="toastcontaienr"></section>
  </body>
</html>
